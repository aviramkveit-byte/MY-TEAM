<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="הצוות">
<title>הצוות של אבירם</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text-2: #6e6e73;
  --text-3: #aeaeb2;
  --border: #e5e5ea;
  --radius: 18px;
  --blue:   #0071e3;
  --teal:   #00897b;
  --amber:  #c77b00;
  --purple: #7c3aed;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --text: #f5f5f7;
    --text-2: #98989d;
    --text-3: #48484a;
    --border: #2c2c2e;
    --blue:   #409cff;
    --teal:   #40c8a8;
    --amber:  #ffd60a;
    --purple: #bf5af2;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px 48px;
}

/* ── Header ── */
.header {
  padding: 52px 4px 28px;
}

.header-eyebrow {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 8px;
}

.header h1 {
  font-size: clamp(28px, 7vw, 38px);
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1.1;
}

.header p {
  margin-top: 8px;
  font-size: 15px;
  color: var(--text-2);
  line-height: 1.5;
}

/* ── Team grid ── */
.team-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 32px;
}

@media (max-width: 380px) {
  .team-grid { grid-template-columns: 1fr; }
}

/* ── Card ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  border: 1px solid var(--border);
  -webkit-tap-highlight-color: transparent;
  transition: transform .15s ease, opacity .15s ease;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  overflow: hidden;
}

.card:active {
  transform: scale(0.97);
  opacity: 0.85;
}

/* color strip on top */
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.card.c-blue::after   { background: var(--blue); }
.card.c-teal::after   { background: var(--teal); }
.card.c-amber::after  { background: var(--amber); }
.card.c-purple::after { background: var(--purple); }

/* avatar */
.avatar {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
}

.c-blue   .avatar { background: rgba(0,113,227,.1);  color: var(--blue); }
.c-teal   .avatar { background: rgba(0,137,123,.1);  color: var(--teal); }
.c-amber  .avatar { background: rgba(199,123,0,.1);  color: var(--amber); }
.c-purple .avatar { background: rgba(124,58,237,.1); color: var(--purple); }

@media (prefers-color-scheme: dark) {
  .c-blue   .avatar { background: rgba(64,156,255,.12); }
  .c-teal   .avatar { background: rgba(64,200,168,.12); }
  .c-amber  .avatar { background: rgba(255,214,10,.12); }
  .c-purple .avatar { background: rgba(191,90,242,.12); }
}

.card-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}

.card-role {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.4;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.card-cta {
  font-size: 13px;
  font-weight: 500;
}

.c-blue   .card-cta { color: var(--blue); }
.c-teal   .card-cta { color: var(--teal); }
.c-amber  .card-cta { color: var(--amber); }
.c-purple .card-cta { color: var(--purple); }

.card-arrow {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}

.c-blue   .card-arrow { background: rgba(0,113,227,.1);  color: var(--blue); }
.c-teal   .card-arrow { background: rgba(0,137,123,.1);  color: var(--teal); }
.c-amber  .card-arrow { background: rgba(199,123,0,.1);  color: var(--amber); }
.c-purple .card-arrow { background: rgba(124,58,237,.1); color: var(--purple); }

@media (prefers-color-scheme: dark) {
  .c-blue   .card-arrow { background: rgba(64,156,255,.12); }
  .c-teal   .card-arrow { background: rgba(64,200,168,.12); }
  .c-amber  .card-arrow { background: rgba(255,214,10,.12); }
  .c-purple .card-arrow { background: rgba(191,90,242,.12); }
}

/* ── Section label ── */
.section-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}

/* ── Quick grid ── */
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 40px;
}

@media (max-width: 380px) {
  .quick-grid { grid-template-columns: 1fr; }
}

.qbtn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  text-align: right;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  -webkit-tap-highlight-color: transparent;
  transition: transform .12s ease;
}

.qbtn:active { transform: scale(0.97); }

.qbtn-who {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.qbtn.q-blue   .qbtn-who { color: var(--blue); }
.qbtn.q-teal   .qbtn-who { color: var(--teal); }
.qbtn.q-amber  .qbtn-who { color: var(--amber); }
.qbtn.q-purple .qbtn-who { color: var(--purple); }

.qbtn-text {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.4;
}

/* ── Footer ── */
.footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-3);
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(28px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: rgba(29,29,31,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  padding: 11px 22px;
  border-radius: 100px;
  white-space: nowrap;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1), opacity .28s;
  opacity: 0;
  pointer-events: none;
  z-index: 99;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

@media (prefers-color-scheme: light) {
  .toast { background: rgba(29,29,31,0.82); }
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <p class="header-eyebrow">R&D · ספקטרום אלקטרומגנטי</p>
    <h1>הצוות של אבירם</h1>
    <p>לחץ על חבר צוות כדי לפתוח שיחה</p>
  </header>

  <div class="team-grid">

    <div class="card c-blue" onclick="chat('דניאל')" role="button" tabindex="0">
      <div class="avatar">ד</div>
      <div>
        <div class="card-name">דניאל</div>
        <div class="card-role">מהנדס RF ואלקטרוניקה</div>
      </div>
      <div class="card-footer">
        <span class="card-cta">שוחח</span>
        <div class="card-arrow">↗</div>
      </div>
    </div>

    <div class="card c-teal" onclick="chat('מיה')" role="button" tabindex="0">
      <div class="avatar">מ</div>
      <div>
        <div class="card-name">מיה</div>
        <div class="card-role">עוזרת אישית</div>
      </div>
      <div class="card-footer">
        <span class="card-cta">שוחח</span>
        <div class="card-arrow">↗</div>
      </div>
    </div>

    <div class="card c-amber" onclick="chat('עמית')" role="button" tabindex="0">
      <div class="avatar">ע</div>
      <div>
        <div class="card-name">עמית</div>
        <div class="card-role">איש רכש טכני</div>
      </div>
      <div class="card-footer">
        <span class="card-cta">שוחח</span>
        <div class="card-arrow">↗</div>
      </div>
    </div>

    <div class="card c-purple" onclick="chat('שירה')" role="button" tabindex="0">
      <div class="avatar">ש</div>
      <div>
        <div class="card-name">שירה</div>
        <div class="card-role">מהנדסת תוכנה</div>
      </div>
      <div class="card-footer">
        <span class="card-cta">שוחח</span>
        <div class="card-arrow">↗</div>
      </div>
    </div>

  </div>

  <p class="section-label">שאלות מהירות</p>
  <div class="quick-grid">

    <button class="qbtn q-blue" onclick="chatQ('דניאל', 'מה הגישה המומלצת ל-wideband direction finding בטווח 100MHz עד 6GHz?')">
      <span class="qbtn-who">דניאל</span>
      <span class="qbtn-text">DF רחב-סרט 100MHz–6GHz</span>
    </button>

    <button class="qbtn q-teal" onclick="chatQ('מיה', 'עזרי לי לתכנן ולתעדף את השבוע הקרוב')">
      <span class="qbtn-who">מיה</span>
      <span class="qbtn-text">תכנון ותעדוף השבוע</span>
    </button>

    <button class="qbtn q-amber" onclick="chatQ('עמית', 'אנחנו צריכים ספקטרום אנלייזר ל-6GHz — מה האפשרויות ומה ה-lead time?')">
      <span class="qbtn-who">עמית</span>
      <span class="qbtn-text">ספקטרום אנלייזר ל-6GHz</span>
    </button>

    <button class="qbtn q-purple" onclick="chatQ('שירה', 'כתבי לי סקריפט Python שמקליט IQ מ-SDR ועושה FFT בזמן-אמת עם ויזואליזציה')">
      <span class="qbtn-who">שירה</span>
      <span class="qbtn-text">סקריפט IQ + FFT real-time</span>
    </button>

  </div>

  <p class="footer">הצוות של אבירם · v2.0 · 2026</p>

</div>

<div class="toast" id="toast"></div>

<script>
const CTX = {
  base: `[הקשר: אתה חלק מהצוות המקצועי של אבירם — מנהל תחום הנדסה, מחקר ופיתוח יכולות חיישנים בספקטרום האלקטרומגנטי. ענה בעברית, בצורה ישירה ומקצועית.]`,
  דניאל: `אתה דניאל, מהנדס RF ואלקטרוניקה בכיר. מומחה ב: LNA/PA/PLL/VCO, אנטנות ו-phased array, DSP, SDR (USRP/HackRF/LimeSDR), ESM/ELINT, direction finding. ישיר, נותן מספרים ו-trade-offs.`,
  מיה: `אתה מיה, עוזרת אישית. תחומייך: לוז, תכנון, מיילים, מסמכים, מעקב משימות. קצרה, ממוקדת, תמיד מסיימת עם צעד הבא.`,
  עמית: `אתה עמית, איש רכש טכני. מומחה ב: רכיבי RF, ציוד מדידה, ספקים (Mouser/DigiKey/RS), RFQ, ITAR/EAR, lead time.`,
  שירה: `אתה שירה, מהנדסת תוכנה DSP. מומחה ב: Python/numpy/scipy, GNU Radio, SDR APIs, FFT/IQ analysis, embedded Linux, C++ real-time.`
};

function buildPrompt(name, question) {
  return `${CTX.base}\n\n${CTX[name]}\n\n${name}, ${question}`;
}

function chat(name) {
  const prompt = buildPrompt(name, '');
  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank', 'noopener');
  toast('פותח שיחה עם ' + name);
}

function chatQ(name, q) {
  const prompt = buildPrompt(name, q);
  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank', 'noopener');
  toast('שולח שאלה ל' + name);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

document.querySelectorAll('.card').forEach(c => {
  c.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') c.click();
  });
});
</script>
</body>
</html>
